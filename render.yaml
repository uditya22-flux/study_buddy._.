services:
  # Backend Web Service
  - type: web
    name: study-buddy-backend
    runtime: node
    buildCommand: cd backend && npm install && npx prisma generate && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: study-buddy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false # Set manually in Render Dashboard
      - key: CLIENT_URL
        fromService:
          type: static
          name: study-buddy-frontend
          property: url

  # Frontend Static Site
  - type: static
    name: study-buddy-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: study-buddy-backend
          property: url
          suffix: /api

databases:
  - name: study-buddy-db
    plan: free
